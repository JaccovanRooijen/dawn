<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dawn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg: #F7F5F2;
  --white: #FFFFFF;
  --text: #1A1714;
  --text-mid: #6B6460;
  --text-soft: #B0AAA5;

  --green:  #3D7A5F;
  --green-light: #E8F3EE;
  --green-mid: #C2DDD1;

  --amber:  #C8711A;
  --amber-light: #FDF0E4;
  --amber-mid: #F0C99A;

  --blue:   #3460A8;
  --blue-light: #E6EDF8;
  --blue-mid: #B4C8E8;

  --rose:   #B8485A;
  --rose-light: #FAECEE;
  --rose-mid: #E8B0B8;

  --border: rgba(26,23,20,0.08);
  --shadow: 0 2px 12px rgba(26,23,20,0.07);
  --shadow-lg: 0 8px 32px rgba(26,23,20,0.12);
}

html, body {
  height:100%; width:100%; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:'Plus Jakarta Sans', sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── Flash ── */
#flash { position:fixed; inset:0; background:radial-gradient(ellipse at 50% 60%, rgba(61,122,95,0.15) 0%, transparent 70%); pointer-events:none; z-index:100; opacity:0; }
#flash.fire { animation:warmFlash 0.5s ease forwards; }
@keyframes warmFlash { 0%{opacity:0} 20%{opacity:1} 100%{opacity:0} }

/* ── App shell ── */
#app { position:relative; height:100%; display:flex; flex-direction:column; z-index:1; }

/* ── Header ── */
.header {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:52px 24px 0; transition:opacity 0.4s; z-index:2; pointer-events:none;
}
.header > *, .header * { pointer-events:all; }

.logo {
  font-size:1.1rem; font-weight:800; letter-spacing:-0.02em; color:var(--text);
}
.logo span { color:var(--green); }

.header-right { display:flex; align-items:center; gap:10px; }

.step-pill {
  background:var(--white); border:1px solid var(--border);
  padding:5px 12px; border-radius:100px;
  font-size:0.7rem; font-weight:600; letter-spacing:0.04em;
  color:var(--text-mid); box-shadow:var(--shadow);
}

.streak-badge {
  display:flex; align-items:center; gap:5px;
  background:var(--amber-light); border:1px solid var(--amber-mid);
  padding:5px 12px; border-radius:100px;
  font-size:0.7rem; font-weight:700; color:var(--amber);
  cursor:pointer; -webkit-tap-highlight-color:transparent;
  transition:all 0.2s; box-shadow:var(--shadow);
}
.streak-badge.inactive { background:var(--white); border-color:var(--border); color:var(--text-soft); }
.streak-badge .flame { font-size:0.8rem; }
.streak-badge.active .flame { animation:flamePop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes flamePop { 0%{transform:scale(0.6)} 60%{transform:scale(1.35)} 100%{transform:scale(1)} }

/* ── Progress bar ── */
.progress-wrap { padding:0 24px; }
.progress-track { width:100%; height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
.progress-fill { height:4px; background:linear-gradient(90deg, var(--green), #5BAF87); border-radius:4px; transition:width 1s linear; }

/* ── Focus area ── */
.focus-area {
  flex:1; display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  padding:0 28px; cursor:pointer;
  user-select:none; -webkit-tap-highlight-color:transparent;
}

.task-card {
  width:100%; max-width:340px;
  background:var(--white); border-radius:24px;
  padding:36px 32px 32px;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--border);
  display:flex; flex-direction:column; gap:20px;
  transition:transform 0.15s ease;
}
.task-card:active { transform:scale(0.985); }

.task-tag {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:100px;
  font-size:0.65rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
  width:fit-content;
}
.task-tag.green  { background:var(--green-light);  color:var(--green); }
.task-tag.amber  { background:var(--amber-light);  color:var(--amber); }
.task-tag.blue   { background:var(--blue-light);   color:var(--blue); }
.task-tag.rose   { background:var(--rose-light);   color:var(--rose); }

.task-label {
  font-size:clamp(2rem, 9vw, 3.2rem);
  font-weight:800; letter-spacing:-0.03em;
  line-height:1.05; color:var(--text);
  transition:opacity 0.4s ease, transform 0.4s ease;
}
.task-label.fade-out { opacity:0; transform:translateY(-10px); }

.task-footer { display:flex; align-items:center; justify-content:space-between; }
.task-duration {
  font-size:0.78rem; font-weight:600; color:var(--text-soft);
  letter-spacing:0.02em;
}
.tap-cue {
  display:flex; align-items:center; gap:6px;
  font-size:0.68rem; font-weight:600; color:var(--text-soft);
  letter-spacing:0.02em;
  animation:breathe 2.5s ease-in-out infinite;
}
.tap-cue-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--green); opacity:0.6;
  animation:dotPulse 2.5s ease-in-out infinite;
}
@keyframes breathe   { 0%,100%{opacity:0.5} 50%{opacity:1} }
@keyframes dotPulse  { 0%,100%{transform:scale(0.8)} 50%{transform:scale(1.2)} }

/* ── Completion screen ── */
.completion { display:none; flex-direction:column; align-items:center; height:100%; padding:32px 24px 40px; overflow-y:auto; }
.completion.visible { display:flex; }

.completion-header { width:100%; margin-top:60px; margin-bottom:28px; text-align:center; }
.completion-icon {
  width:64px; height:64px; border-radius:20px;
  background:var(--green-light); display:inline-flex; align-items:center; justify-content:center;
  font-size:1.8rem; margin-bottom:16px;
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.completion-title { font-size:1.6rem; font-weight:800; letter-spacing:-0.03em; color:var(--text); margin-bottom:4px; }
.completion-sub { font-size:0.82rem; font-weight:500; color:var(--text-mid); }

@keyframes popIn { from{transform:scale(0) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }

.streak-row {
  width:100%; display:flex; gap:12px; margin-bottom:16px;
}
.stat-card {
  flex:1; background:var(--white); border-radius:20px;
  padding:20px 18px; border:1px solid var(--border); box-shadow:var(--shadow);
}
.stat-card.accent-green { background:var(--green); border-color:var(--green); }
.stat-card.accent-green .stat-label { color:rgba(255,255,255,0.7); }
.stat-card.accent-green .stat-value { color:#fff; }
.stat-label { font-size:0.62rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-soft); margin-bottom:6px; }
.stat-value { font-size:2rem; font-weight:800; letter-spacing:-0.03em; color:var(--text); line-height:1; }
.stat-value span { font-size:0.9rem; font-weight:600; }

.milestone-card-v2 {
  width:100%; background:var(--white); border-radius:20px;
  padding:20px 22px; border:1px solid var(--border); box-shadow:var(--shadow);
  margin-bottom:20px; animation:popIn 0.4s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
.milestone-card-v2.achieved { background:var(--amber-light); border-color:var(--amber-mid); }
.mc2-label { font-size:0.62rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-soft); margin-bottom:8px; }
.milestone-card-v2.achieved .mc2-label { color:var(--amber); }
.mc2-next { font-size:1rem; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
.mc2-next span { color:var(--green); }
.milestone-card-v2.achieved .mc2-next span { color:var(--amber); }
.mc2-reward { font-size:0.78rem; font-weight:500; color:var(--text-mid); margin-top:4px; }

.btn-primary {
  width:100%; padding:16px 28px;
  background:var(--text); border:none; color:var(--white);
  font-family:inherit; font-size:0.82rem; font-weight:700;
  letter-spacing:0.02em; cursor:pointer; border-radius:14px;
  transition:all 0.2s; -webkit-tap-highlight-color:transparent;
}
.btn-primary:hover { background:#2c2420; transform:translateY(-1px); box-shadow:var(--shadow-lg); }
.btn-primary:active { transform:translateY(0); }

.btn-ghost {
  width:100%; padding:12px 28px; margin-top:10px;
  background:none; border:1.5px solid var(--border); color:var(--text-mid);
  font-family:inherit; font-size:0.78rem; font-weight:600;
  letter-spacing:0.02em; cursor:pointer; border-radius:14px;
  transition:all 0.2s;
}
.btn-ghost:hover { border-color:var(--text-mid); color:var(--text); }

/* ── Peek button ── */
.peek-btn {
  position:fixed; bottom:36px; right:24px;
  background:var(--text); border:none;
  width:52px; height:52px; border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:10; transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 16px rgba(26,23,20,0.25);
}
.peek-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(26,23,20,0.3); }
.peek-btn:active { transform:scale(0.94); }
.peek-btn svg { width:18px; height:18px; stroke:#fff; }

/* ── Overlay ── */
.overlay { position:fixed; inset:0; z-index:20; pointer-events:none; display:flex; flex-direction:column; justify-content:flex-end; }
.overlay-backdrop { position:absolute; inset:0; background:rgba(26,23,20,0.3); opacity:0; transition:opacity 0.35s ease; backdrop-filter:blur(4px); }
.overlay-panel {
  position:relative;
  background:var(--white);
  border-top:1px solid var(--border);
  border-radius:28px 28px 0 0;
  padding:20px 24px 48px;
  transform:translateY(100%);
  transition:transform 0.45s cubic-bezier(0.32,0.72,0,1);
  max-height:82vh; overflow-y:auto;
}
.overlay.open { pointer-events:all; }
.overlay.open .overlay-backdrop { opacity:1; }
.overlay.open .overlay-panel { transform:translateY(0); }

.overlay-handle { width:40px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 20px; }
.overlay-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.overlay-title { font-size:1.1rem; font-weight:800; letter-spacing:-0.02em; color:var(--text); }

.btn-edit {
  padding:7px 16px; border-radius:100px;
  background:var(--bg); border:1.5px solid var(--border);
  color:var(--text-mid); font-family:inherit; font-size:0.68rem; font-weight:700;
  letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
}
.btn-edit:hover, .btn-edit.active { background:var(--text); border-color:var(--text); color:var(--white); }

/* ── Tabs ── */
.overlay-tabs { display:flex; gap:6px; margin-bottom:20px; }
.overlay-tab {
  flex:1; padding:9px 0; background:var(--bg); border:1.5px solid transparent;
  color:var(--text-soft); font-family:inherit; font-size:0.7rem; font-weight:700;
  letter-spacing:0.04em; text-transform:uppercase; cursor:pointer;
  transition:all 0.2s; border-radius:10px;
}
.overlay-tab.active { background:var(--text); color:var(--white); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ── Task list ── */
.task-list { list-style:none; }
.task-item { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--border); }
.task-item:last-child { border-bottom:none; }

.task-indicator {
  flex-shrink:0; width:22px; height:22px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  border:1.5px solid var(--border); transition:all 0.2s;
}
.task-item.done .task-indicator { background:var(--green); border-color:var(--green); }
.task-item.done .task-indicator::after { content:''; display:block; width:8px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translate(1px,-1px); }
.task-item.active .task-indicator { background:var(--blue-light); border-color:var(--blue); }
.task-item.active .task-indicator::after { content:''; display:block; width:7px; height:7px; border-radius:3px; background:var(--blue); }
.task-item.future .task-indicator { border-color:var(--border); }

.task-info { flex:1; }
.task-name { font-size:0.88rem; font-weight:600; color:var(--text); }
.task-time { font-size:0.65rem; font-weight:500; color:var(--text-soft); margin-top:2px; }
.task-item.done .task-name { text-decoration:line-through; color:var(--text-soft); }
.task-item.done { opacity:0.6; }
.task-item.active .task-name { color:var(--blue); }
.task-item.future .task-name { color:var(--text-mid); }

.tasks-total { font-size:0.65rem; font-weight:600; color:var(--text-soft); text-align:right; margin-top:12px; letter-spacing:0.03em; }

/* ── Edit mode ── */
.edit-list { list-style:none; display:none; }
.edit-list.visible { display:block; }
.task-list.hidden { display:none; }

.edit-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); animation:slideIn 0.2s ease forwards; }
.edit-item:last-child { border-bottom:none; }
@keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }

.drag-handle { cursor:grab; color:var(--text-soft); font-size:0.9rem; padding:4px; flex-shrink:0; opacity:0.5; }
.drag-handle:hover { opacity:1; }
.drag-handle:active { cursor:grabbing; }

.edit-fields { flex:1; display:flex; flex-direction:column; gap:6px; }
.edit-name-input {
  background:var(--bg); border:1.5px solid var(--border); border-radius:10px;
  color:var(--text); font-family:inherit; font-size:0.84rem; font-weight:500;
  padding:8px 12px; width:100%; outline:none; transition:border-color 0.2s;
}
.edit-name-input:focus { border-color:var(--blue); }
.edit-name-input::placeholder { color:var(--text-soft); }

.edit-duration-row { display:flex; align-items:center; gap:8px; }
.edit-duration-label { font-size:0.6rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-soft); white-space:nowrap; }
.edit-duration-input {
  background:var(--bg); border:1.5px solid var(--border); border-radius:8px;
  color:var(--text); font-family:inherit; font-size:0.8rem; font-weight:500;
  padding:6px 8px; width:58px; outline:none; transition:border-color 0.2s; text-align:center;
}
.edit-duration-input:focus { border-color:var(--blue); }

.delete-btn {
  background:var(--rose-light); border:none; color:var(--rose);
  cursor:pointer; width:28px; height:28px; border-radius:8px;
  font-size:1rem; line-height:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.delete-btn:hover { background:var(--rose); color:#fff; }

.add-task-btn {
  display:flex; align-items:center; gap:8px; width:100%; margin-top:14px;
  padding:12px 0; background:var(--bg); border:1.5px dashed var(--border);
  border-radius:12px; color:var(--text-soft); font-family:inherit;
  font-size:0.72rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
  cursor:pointer; justify-content:center; transition:all 0.25s;
}
.add-task-btn:hover { border-color:var(--green); color:var(--green); background:var(--green-light); }

.edit-item.drag-over { opacity:0.3; }
.edit-item.dragging { opacity:0.15; }

/* ── Milestones ── */
.milestones-list { list-style:none; }
.milestone-item { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); }
.milestone-item:last-child { border-bottom:none; }

.milestone-icon {
  flex-shrink:0; width:40px; height:40px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; background:var(--bg); border:1.5px solid var(--border);
  transition:all 0.3s;
}
.milestone-item.reached .milestone-icon { background:var(--green-light); border-color:var(--green-mid); }
.milestone-item.next    .milestone-icon { background:var(--amber-light); border-color:var(--amber-mid); }

.milestone-info { flex:1; }
.milestone-days { font-size:0.8rem; font-weight:700; color:var(--text-mid); margin-bottom:4px; }
.milestone-item.reached .milestone-days { color:var(--green); }
.milestone-item.next    .milestone-days { color:var(--amber); }

.milestone-reward-input {
  background:transparent; border:none; border-bottom:1.5px solid var(--border);
  color:var(--text); font-family:inherit; font-size:0.76rem; font-weight:500;
  width:100%; outline:none; padding:2px 0; transition:border-color 0.2s;
}
.milestone-reward-input:focus { border-color:var(--blue); }
.milestone-reward-input::placeholder { color:var(--text-soft); }
.milestone-item.reached .milestone-reward-input { color:var(--text-mid); }

.milestone-progress-wrap { margin-top:6px; }
.milestone-progress-track { height:3px; background:var(--border); border-radius:4px; overflow:hidden; }
.milestone-progress-fill { height:3px; background:linear-gradient(90deg, var(--amber), #E8A040); border-radius:4px; transition:width 0.6s ease; }

/* ── Streak info ── */
.streak-info-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); }
.streak-info-label { font-size:0.65rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-soft); }
.streak-info-value { font-size:0.95rem; font-weight:800; color:var(--text); }

/* ── Set streak box ── */
.restore-streak-box {
  margin-bottom:6px; border:1.5px solid var(--border);
  border-radius:16px; padding:18px; background:var(--bg);
  animation:slideIn 0.3s ease forwards;
}
.restore-streak-box .rs-label { font-size:0.62rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--blue); margin-bottom:5px; }
.restore-streak-box .rs-desc { font-size:0.76rem; font-weight:500; color:var(--text-mid); line-height:1.5; }

.rs-set-row { display:flex; align-items:center; justify-content:center; gap:20px; padding:16px 0 6px; }
.rs-stepper {
  width:36px; height:36px; border-radius:10px;
  background:var(--white); border:1.5px solid var(--border);
  color:var(--text); font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:inherit; transition:all 0.2s;
}
.rs-stepper:hover { background:var(--text); color:var(--white); border-color:var(--text); }
.rs-stepper:active { transform:scale(0.92); }

.rs-count-wrap { text-align:center; min-width:64px; }
.rs-count-num { font-size:2.2rem; font-weight:800; letter-spacing:-0.03em; color:var(--text); display:block; line-height:1; }
.rs-count-label { font-size:0.6rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-soft); }

.restore-confirm-row { display:flex; gap:8px; margin-top:14px; border-top:1px solid var(--border); padding-top:14px; }
.restore-confirm-btn {
  flex:1; padding:10px 0; background:var(--text); border:none;
  color:var(--white); font-family:inherit; font-size:0.68rem; font-weight:700;
  letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; border-radius:10px; transition:all 0.2s;
}
.restore-confirm-btn:hover { background:#2c2420; }
.restore-cancel-btn {
  flex:1; padding:10px 0; background:var(--white); border:1.5px solid var(--border);
  color:var(--text-mid); font-family:inherit; font-size:0.68rem; font-weight:700;
  letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; border-radius:10px; transition:all 0.2s;
}
.restore-cancel-btn:hover { border-color:var(--text-mid); color:var(--text); }

/* Scrollbar */
.overlay-panel::-webkit-scrollbar { width:3px; }
.overlay-panel::-webkit-scrollbar-track { background:transparent; }
.overlay-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.main-content { transition:opacity 0.4s; flex:1; display:flex; flex-direction:column; }
.main-content.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>

<div id="flash"></div>

<div id="app">
  <!-- Header -->
  <div class="header" id="header">
    <div class="logo">Dawn<span>.</span></div>
    <div class="header-right">
      <div class="streak-badge inactive" id="streakBadge">
        <span class="flame">🔥</span>
        <span id="streakBadgeCount">0</span>
      </div>
      <div class="step-pill" id="stepCounter">1 / 4</div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main-content" id="mainContent">
    <div class="focus-area" id="focusArea">
      <div class="task-card" id="taskCard">
        <div class="task-tag green" id="taskTag">
          <span id="taskTagDot">●</span>
          <span id="taskTagText">Now</span>
        </div>
        <div class="task-label" id="taskLabel">Wake Up</div>
        <div class="task-footer">
          <div class="task-duration" id="taskDuration">2 min</div>
          <div class="tap-cue" id="tapHint">
            <div class="tap-cue-dot"></div>
            Tap to continue
          </div>
        </div>
      </div>
    </div>
    <div style="padding:0 24px 28px">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Completion -->
  <div class="completion" id="completionScreen">
    <div class="completion-header">
      <div class="completion-icon">✦</div>
      <div class="completion-title">All done!</div>
      <div class="completion-sub" id="completionSub">Great start to the day</div>
    </div>

    <div class="streak-row">
      <div class="stat-card accent-green">
        <div class="stat-label">Day streak</div>
        <div class="stat-value"><span id="streakCountBig">0</span> 🔥</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Best</div>
        <div class="stat-value" id="longestBig">0<span> days</span></div>
      </div>
    </div>

    <div class="milestone-card-v2" id="milestoneCard">
      <div class="mc2-label" id="mcLabel">Next milestone</div>
      <div class="mc2-next" id="mcNext"></div>
      <div class="mc2-reward" id="mcReward"></div>
    </div>

    <button class="btn-primary" id="restartBtn">Start a new day</button>
    <button class="btn-ghost" id="homeBtn" onclick="openOverlay('tasks')">View routine</button>
  </div>
</div>

<!-- Peek button -->
<button class="peek-btn" id="peekBtn" aria-label="View list">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 6h16M4 12h16M4 18h10"/>
  </svg>
</button>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-backdrop" id="overlayBackdrop"></div>
  <div class="overlay-panel">
    <div class="overlay-handle"></div>
    <div class="overlay-header">
      <div class="overlay-title">Morning Routine</div>
      <button class="btn-edit" id="editToggleBtn">Edit</button>
    </div>

    <div class="overlay-tabs">
      <button class="overlay-tab active" data-tab="tasks">Tasks</button>
      <button class="overlay-tab" data-tab="milestones">Milestones</button>
    </div>

    <div class="tab-panel active" id="tab-tasks">
      <ul class="task-list" id="taskList"></ul>
      <ul class="edit-list" id="editList"></ul>
      <button class="add-task-btn" id="addTaskBtn" style="display:none">+ Add task</button>
      <div class="tasks-total" id="overlayTotal"></div>
    </div>

    <div class="tab-panel" id="tab-milestones">
      <div class="streak-info-row">
        <span class="streak-info-label">Current streak</span>
        <span class="streak-info-value" id="streakInfoValue">🔥 0 days</span>
      </div>
      <div class="streak-info-row" style="border-bottom:none; padding-bottom:16px;">
        <span class="streak-info-label">Longest streak</span>
        <span class="streak-info-value" id="longestInfoValue">0 days</span>
      </div>
      <ul class="milestones-list" id="milestonesList"></ul>
    </div>
  </div>
</div>

<script>
/* ── DATA ── */
const DEFAULT_TASKS = [
  { name: 'Wake Up & Make Bed', duration: 2  },
  { name: 'Meditate',           duration: 10 },
  { name: 'Drink 500ml Water',  duration: 1  },
  { name: 'Yoga / Stretch',     duration: 15 },
];
const MILESTONE_DAYS  = [3, 7, 14, 30, 60, 100];
const MILESTONE_ICONS = ['🌱','⚡','🌙','🏆','💎','👑'];
const TAG_COLORS = ['green','blue','amber','rose','green','blue'];

function load(k, fb) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch { return fb; } }
function save(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

let tasks       = load('dawn3-tasks',   DEFAULT_TASKS);
let streak      = load('dawn3-streak',  { count:0, longest:0, lastDate:null });
let rewards     = load('dawn3-rewards', {});
let restoreData = load('dawn3-restore', { lastUsedDate:null });

const saveTasks   = () => save('dawn3-tasks',   tasks);
const saveStreak  = () => save('dawn3-streak',  streak);
const saveRewards = () => save('dawn3-rewards', rewards);
const saveRestore = () => save('dawn3-restore', restoreData);

/* ── STREAK LOGIC ── */
function todayStr() { return new Date().toISOString().slice(0,10); }

function weekStr(date) {
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day);
  const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return `${d.getUTCFullYear()}-W${String(Math.ceil((((d-y)/86400000)+1)/7)).padStart(2,'0')}`;
}

function isStreakAlive() {
  if (!streak.lastDate) return false;
  const yd=new Date(); yd.setDate(yd.getDate()-1);
  return streak.lastDate===todayStr()||streak.lastDate===yd.toISOString().slice(0,10);
}

function checkAndUpdateStreak() {
  const today=todayStr(); if(streak.lastDate===today) return;
  const yd=new Date(); yd.setDate(yd.getDate()-1); const yStr=yd.toISOString().slice(0,10);
  if(streak.lastDate===yStr) streak.count++;
  else streak.count=1;
  streak.lastDate=today;
  if(streak.count>streak.longest) streak.longest=streak.count;
  saveStreak();
}

function getNextMilestone() { for(const m of MILESTONE_DAYS) if(streak.count<m) return m; return null; }

function canRestoreStreak() {
  if(isStreakAlive()||streak.count===0) return false;
  const thisWeek=weekStr(new Date());
  if(restoreData.lastUsedDate&&weekStr(new Date(restoreData.lastUsedDate))===thisWeek) return false;
  if(!streak.lastDate) return false;
  return Math.round((new Date()-new Date(streak.lastDate+'T00:00:00'))/86400000)<=2;
}

/* ── DOM ── */
const $=id=>document.getElementById(id);
const taskLabel=$('taskLabel'), taskDuration=$('taskDuration'), stepCounter=$('stepCounter');
const progressFill=$('progressFill'), mainContent=$('mainContent'), completionScreen=$('completionScreen');
const progressWrap=$('progressWrap'), header=$('header'), tapHint=$('tapHint');
const overlay=$('overlay'), overlayBackdrop=$('overlayBackdrop'), peekBtn=$('peekBtn');
const taskList=$('taskList'), editList=$('editList'), addTaskBtn=$('addTaskBtn');
const editToggleBtn=$('editToggleBtn'), restartBtn=$('restartBtn'), focusArea=$('focusArea');
const flashEl=$('flash');
const streakBadge=$('streakBadge'), streakBadgeCount=$('streakBadgeCount');
const streakCountBig=$('streakCountBig'), longestBig=$('longestBig'), milestoneCard=$('milestoneCard');
const mcLabel=$('mcLabel'), mcNext=$('mcNext'), mcReward=$('mcReward');
const completionSub=$('completionSub');
const milestonesList=$('milestonesList');
const streakInfoValue=$('streakInfoValue'), longestInfoValue=$('longestInfoValue');

let currentIndex=0, timer=null, elapsed=0, editMode=false, dragSrcIndex=null, dragSrcEl=null;

/* ── AUDIO ── */
let audioCtx=null;
function getCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function tone(freq,start,dur,vol=0.1,type='sine'){
  try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,c.currentTime+start);g.gain.linearRampToValueAtTime(vol,c.currentTime+start+0.02);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);o.start(c.currentTime+start);o.stop(c.currentTime+start+dur);}catch{}
}
function playClick()     { tone(700,0,0.06,0.09); }
function playChime()     { [[523.25,0],[659.25,0.15],[783.99,0.3]].forEach(([f,d])=>tone(f,d,0.55,0.1)); }
function playMilestone() { [[523.25,0],[659.25,0.1],[783.99,0.2],[1046.5,0.32],[1318.5,0.46]].forEach(([f,d])=>tone(f,d,0.6,0.1)); }
function haptic(p=12)    { if(navigator.vibrate) navigator.vibrate(p); }
function triggerFlash()  { flashEl.classList.remove('fire'); void flashEl.offsetWidth; flashEl.classList.add('fire'); }

/* ── STREAK UI ── */
function updateStreakBadge() {
  const alive=isStreakAlive();
  streakBadgeCount.textContent=streak.count;
  streakBadge.classList.toggle('active', alive&&streak.count>0);
  streakBadge.classList.toggle('inactive', !(alive&&streak.count>0));
}

function renderCompletionStreak() {
  streakCountBig.textContent=streak.count;
  longestBig.innerHTML=`${streak.longest}<span> days</span>`;
  const next=getNextMilestone();
  const justHit=MILESTONE_DAYS.includes(streak.count);
  if(justHit){
    milestoneCard.className='milestone-card-v2 achieved';
    mcLabel.textContent='🎉 Milestone reached!';
    mcNext.innerHTML=`<span>${streak.count} days</span>`;
    mcReward.textContent=rewards[streak.count]?`Your reward: ${rewards[streak.count]}`:'Set your reward in Milestones';
    playMilestone(); haptic([60,40,60,40,120]);
  } else if(next){
    milestoneCard.className='milestone-card-v2';
    mcLabel.textContent='Next milestone';
    const left=next-streak.count;
    mcNext.innerHTML=`<span>${next} days</span> — ${left} day${left!==1?'s':''} to go`;
    mcReward.textContent=rewards[next]?`Reward: ${rewards[next]}`:'Set a reward in Milestones ↗';
  } else {
    milestoneCard.className='milestone-card-v2 achieved';
    mcLabel.textContent='👑 All milestones reached!';
    mcNext.innerHTML=`<span>${streak.count} days</span> and counting`;
    mcReward.textContent='Legendary.';
  }
}

/* ── MILESTONES ── */
function renderMilestonesList() {
  milestonesList.innerHTML='';
  streakInfoValue.textContent=`🔥 ${streak.count} day${streak.count!==1?'s':''}`;
  longestInfoValue.textContent=`${streak.longest} day${streak.longest!==1?'s':''}`;
  const existing=document.querySelector('.restore-streak-box');
  if(existing) existing.remove();
  const box=document.createElement('div'); box.className='restore-streak-box';
  const thisWeek=weekStr(new Date());
  const usedThisWeek=restoreData.lastUsedDate&&weekStr(new Date(restoreData.lastUsedDate))===thisWeek;
  if(usedThisWeek){
    box.innerHTML=`<div class="rs-label">🛡 Streak shield</div><div class="rs-desc">Streak set this week. Come back next week to adjust again.</div>`;
  } else {
    box.innerHTML=`
      <div class="rs-label">🛡 Set streak</div>
      <div class="rs-desc">Manually set your streak count — once per week.</div>
      <div class="rs-set-row">
        <button class="rs-stepper" id="rsDown">−</button>
        <div class="rs-count-wrap"><span class="rs-count-num" id="rsCount">${streak.count}</span><span class="rs-count-label">days</span></div>
        <button class="rs-stepper" id="rsUp">+</button>
      </div>
      <div class="restore-confirm-row">
        <button class="restore-confirm-btn" id="confirmSetBtn">Save streak</button>
        <button class="restore-cancel-btn" id="cancelSetBtn">Cancel</button>
      </div>`;
    let draft=streak.count;
    const rsEl=box.querySelector('#rsCount');
    box.querySelector('#rsDown').addEventListener('click',()=>{ if(draft>0){draft--;rsEl.textContent=draft;} });
    box.querySelector('#rsUp').addEventListener('click',()=>{ draft++;rsEl.textContent=draft; });
    box.querySelector('#confirmSetBtn').addEventListener('click',()=>{
      streak.count=draft; if(draft>streak.longest) streak.longest=draft;
      const yd=new Date(); yd.setDate(yd.getDate()-1); streak.lastDate=yd.toISOString().slice(0,10);
      restoreData.lastUsedDate=todayStr(); saveStreak(); saveRestore(); updateStreakBadge(); renderMilestonesList(); haptic([30,20,60]);
    });
    box.querySelector('#cancelSetBtn').addEventListener('click',()=>renderMilestonesList());
  }
  milestonesList.parentNode.insertBefore(box, milestonesList);

  MILESTONE_DAYS.forEach((days,i)=>{
    const reached=streak.count>=days;
    const isNext=!reached&&getNextMilestone()===days;
    const li=document.createElement('li');
    li.className='milestone-item'+(reached?' reached':isNext?' next':'');
    const pct=reached?100:Math.min(100,Math.round((streak.count/days)*100));
    li.innerHTML=`
      <div class="milestone-icon">${MILESTONE_ICONS[i]}</div>
      <div class="milestone-info">
        <div class="milestone-days">${days} day${days!==1?'s':''} ${reached?'✓':''}</div>
        <input class="milestone-reward-input" type="text" placeholder="${reached?'Reward reached':'Set your reward...'}" value="${rewards[days]||''}" data-days="${days}" ${reached?'readonly':''}>
        ${!reached?`<div class="milestone-progress-wrap"><div class="milestone-progress-track"><div class="milestone-progress-fill" style="width:${pct}%"></div></div></div>`:''}
      </div>`;
    if(!reached) li.querySelector('.milestone-reward-input').addEventListener('input',e=>{ rewards[days]=e.target.value; saveRewards(); });
    milestonesList.appendChild(li);
  });
}

/* ── TASK RENDERING ── */
function formatDuration(min) { return min===1?'1 min':`${min} min`; }
function updateProgress(pct) { progressFill.style.width=pct+'%'; }

function getTagColor(index) { return TAG_COLORS[index % TAG_COLORS.length]; }

function renderTask(index, transition=true) {
  if(index>=tasks.length){ showCompletion(); return; }
  const task=tasks[index];
  stepCounter.textContent=`${index+1} / ${tasks.length}`;
  const tagEl=$('taskTagText');
  const tagWrap=$('taskTag');
  const color=getTagColor(index);
  const labels=['Now','Focus','Hydrate','Move','Breathe','Rest','Reflect','Energize'];
  const tagLabel=labels[index]||'Now';

  if(transition){
    taskLabel.classList.add('fade-out');
    setTimeout(()=>{
      taskLabel.textContent=task.name;
      taskDuration.textContent=formatDuration(task.duration);
      taskLabel.classList.remove('fade-out');
      tagWrap.className='task-tag '+color;
      tagEl.textContent=tagLabel;
    },380);
  } else {
    taskLabel.textContent=task.name;
    taskDuration.textContent=formatDuration(task.duration);
    tagWrap.className='task-tag '+color;
    tagEl.textContent=tagLabel;
  }
  startTimer(task.duration);
  renderList();
}

function startTimer(minutes) {
  clearInterval(timer); elapsed=0;
  const total=minutes*60; updateProgress(0);
  timer=setInterval(()=>{ elapsed++; updateProgress(Math.min((elapsed/total)*100,100)); if(elapsed>=total) clearInterval(timer); },1000);
}

function nextTask() {
  haptic(12); triggerFlash(); playClick();
  currentIndex++;
  currentIndex>=tasks.length?showCompletion():renderTask(currentIndex);
}

function showCompletion() {
  clearInterval(timer); updateProgress(100);
  checkAndUpdateStreak(); playChime(); updateStreakBadge();
  setTimeout(()=>{
    mainContent.classList.add('hidden');
    header.style.opacity='0';
    completionScreen.classList.add('visible');
    progressWrap.style.opacity='0';
    renderCompletionStreak();
  },500);
}

function restart() {
  currentIndex=0; elapsed=0;
  completionScreen.classList.remove('visible');
  mainContent.classList.remove('hidden');
  header.style.opacity='1'; progressWrap.style.opacity='1';
  renderTask(0,false);
}

/* ── TASK LIST ── */
function renderList() {
  taskList.innerHTML='';
  const total=tasks.reduce((s,t)=>s+t.duration,0);
  const totalEl=$('overlayTotal');
  if(totalEl) totalEl.textContent=`${total} min total`;
  tasks.forEach((t,i)=>{
    const li=document.createElement('li');
    li.className='task-item '+(i<currentIndex?'done':i===currentIndex?'active':'future');
    li.innerHTML=`<div class="task-indicator"></div><div class="task-info"><div class="task-name">${t.name}</div><div class="task-time">${formatDuration(t.duration)}</div></div>`;
    taskList.appendChild(li);
  });
}

/* ── EDIT LIST ── */
function reorderTasks(from, to) {
  if(from===to) return;
  const moved=tasks.splice(from,1)[0]; tasks.splice(to,0,moved);
  if(from===currentIndex) currentIndex=to;
  else if(from<currentIndex&&to>=currentIndex) currentIndex--;
  else if(from>currentIndex&&to<=currentIndex) currentIndex++;
  saveTasks(); renderEditList(); syncFocus(currentIndex);
}

function renderEditList() {
  editList.innerHTML='';
  const total=tasks.reduce((s,t)=>s+t.duration,0);
  const totalEl=$('overlayTotal'); if(totalEl) totalEl.textContent=`${total} min total`;
  tasks.forEach((t,i)=>{
    const li=document.createElement('li');
    li.className='edit-item'; li.dataset.index=i; li.style.animationDelay=(i*40)+'ms';
    li.innerHTML=`<span class="drag-handle" data-i="${i}">⠿</span>
      <div class="edit-fields">
        <input class="edit-name-input" type="text" value="${t.name}" placeholder="Task name" data-i="${i}">
        <div class="edit-duration-row">
          <span class="edit-duration-label">Duration (min)</span>
          <input class="edit-duration-input" type="number" min="1" max="120" value="${t.duration}" data-i="${i}">
        </div>
      </div>
      <button class="delete-btn" data-i="${i}">×</button>`;
    li.querySelector('.edit-name-input').addEventListener('input',e=>{tasks[+e.target.dataset.i].name=e.target.value||'New task';saveTasks();syncFocus(+e.target.dataset.i);});
    li.querySelector('.edit-duration-input').addEventListener('input',e=>{tasks[+e.target.dataset.i].duration=Math.max(1,Math.min(120,parseInt(e.target.value)||1));saveTasks();syncFocus(+e.target.dataset.i);});
    li.querySelector('.delete-btn').addEventListener('click',e=>{
      const idx=+e.target.dataset.i; if(tasks.length===1) return;
      tasks.splice(idx,1); if(currentIndex>=tasks.length) currentIndex=tasks.length-1;
      saveTasks(); renderEditList(); syncFocus(currentIndex);
    });
    li.querySelector('.drag-handle').addEventListener('touchstart', onTouchStart, {passive:false});
    li.draggable=true;
    li.addEventListener('dragstart',e=>{dragSrcIndex=i;dragSrcEl=li;setTimeout(()=>li.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    li.addEventListener('dragend',()=>{li.classList.remove('dragging');document.querySelectorAll('.edit-item').forEach(el=>el.classList.remove('drag-over'));});
    li.addEventListener('dragover',e=>{e.preventDefault();if(li!==dragSrcEl)li.classList.add('drag-over');});
    li.addEventListener('dragleave',()=>li.classList.remove('drag-over'));
    li.addEventListener('drop',e=>{e.preventDefault();li.classList.remove('drag-over');if(dragSrcIndex===null||dragSrcIndex===i)return;reorderTasks(dragSrcIndex,i);});
    editList.appendChild(li);
  });
}

let touchDragIdx=null, touchClone=null, touchOffsetY=0;
function onTouchStart(e) {
  e.preventDefault();
  const li=e.currentTarget.closest('.edit-item');
  touchDragIdx=+li.dataset.index;
  const rect=li.getBoundingClientRect();
  touchOffsetY=e.touches[0].clientY-rect.top;
  touchClone=li.cloneNode(true);
  touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:999;opacity:0.92;background:var(--white);border-radius:12px;box-shadow:var(--shadow-lg);pointer-events:none;`;
  document.body.appendChild(touchClone); li.style.opacity='0.2';
  document.addEventListener('touchmove',onTouchMove,{passive:false});
  document.addEventListener('touchend',onTouchEnd);
}
function onTouchMove(e) {
  e.preventDefault(); if(!touchClone) return;
  touchClone.style.top=(e.touches[0].clientY-touchOffsetY)+'px';
  document.querySelectorAll('.edit-item').forEach(el=>el.classList.remove('drag-over'));
  for(const el of [...editList.querySelectorAll('.edit-item')]){
    const r=el.getBoundingClientRect();
    if(e.touches[0].clientY>r.top&&e.touches[0].clientY<r.bottom){if(+el.dataset.index!==touchDragIdx)el.classList.add('drag-over');break;}
  }
}
function onTouchEnd(e) {
  document.removeEventListener('touchmove',onTouchMove);
  document.removeEventListener('touchend',onTouchEnd);
  if(touchClone){touchClone.remove();touchClone=null;}
  let toIdx=touchDragIdx;
  for(const el of [...editList.querySelectorAll('.edit-item')]){
    el.classList.remove('drag-over');
    const r=el.getBoundingClientRect();
    if(e.changedTouches[0].clientY>r.top&&e.changedTouches[0].clientY<r.bottom){toIdx=+el.dataset.index;break;}
  }
  reorderTasks(touchDragIdx,toIdx); touchDragIdx=null;
}

function syncFocus(idx) {
  if(idx===currentIndex){taskLabel.textContent=tasks[currentIndex].name;taskDuration.textContent=formatDuration(tasks[currentIndex].duration);}
  stepCounter.textContent=`${currentIndex+1} / ${tasks.length}`;
}

function setEditMode(on) {
  editMode=on;
  editToggleBtn.textContent=on?'Done':'Edit';
  editToggleBtn.classList.toggle('active',on);
  taskList.classList.toggle('hidden',on);
  addTaskBtn.style.display=on?'flex':'none';
  if(on){editList.classList.add('visible');renderEditList();}
  else{editList.classList.remove('visible');renderList();}
}

document.querySelectorAll('.overlay-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.overlay-tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active'); $('tab-'+btn.dataset.tab).classList.add('active');
    editToggleBtn.style.display=btn.dataset.tab==='tasks'?'':'none';
    if(btn.dataset.tab==='milestones'){if(editMode)setEditMode(false);renderMilestonesList();}
    else renderList();
  });
});

editToggleBtn.addEventListener('click',()=>setEditMode(!editMode));
addTaskBtn.addEventListener('click',()=>{
  tasks.push({name:'New task',duration:5});saveTasks();renderEditList();
  setTimeout(()=>{const p=document.querySelector('.overlay-panel');p.scrollTop=p.scrollHeight;const ins=editList.querySelectorAll('.edit-name-input');if(ins.length){ins[ins.length-1].focus();ins[ins.length-1].select();}},50);
});

function openOverlay(tab='tasks') {
  overlay.classList.add('open');
  document.querySelectorAll('.overlay-tab').forEach(b=>{b.classList.toggle('active',b.dataset.tab===tab);});
  document.querySelectorAll('.tab-panel').forEach(p=>{p.classList.toggle('active',p.id==='tab-'+tab);});
  editToggleBtn.style.display=tab==='tasks'?'':'none';
  if(tab==='milestones') renderMilestonesList();
  else { editMode?renderEditList():renderList(); }
}
function closeOverlay() { overlay.classList.remove('open'); if(editMode) setEditMode(false); }

peekBtn.addEventListener('click',()=>overlay.classList.contains('open')?closeOverlay():openOverlay('tasks'));
overlayBackdrop.addEventListener('click',closeOverlay);
focusArea.addEventListener('click',()=>nextTask());
restartBtn.addEventListener('click',restart);
streakBadge.addEventListener('click',()=>openOverlay('milestones'));

let touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(overlay.classList.contains('open')){if(touchStartY-e.changedTouches[0].clientY<-60)closeOverlay();return;}
  if(touchStartY-e.changedTouches[0].clientY>60)openOverlay('tasks');
},{passive:true});

/* ── INIT ── */
updateStreakBadge();
renderTask(0,false);
</script>
</body>
</html>
